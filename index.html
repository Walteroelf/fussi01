<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Fußball-Mathe</title>

  <style>
    :root {
      --bg: #f5f6f2;
      --card: #ffffff;
      --text: #1f2933;
      --muted: #6b7280;
      --line: #d9ded6;
      --green: #2f6f4e;
      --green-soft: #e8f3ec;
      --blue-soft: #eef4fb;
      --yellow-soft: #fff7df;
      --red-soft: #fdecec;
      --button: #eef0eb;
      --button-dark: #2f6f4e;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 1024px;
      min-height: 100svh;
      padding: 24px;
      display: flex;
      flex-direction: column;
    }

    .screen {
      display: none;
      flex: 1;
    }

    .screen.active {
      display: flex;
      flex-direction: column;
    }

    .card {
      background: var(--card);
      border: 2px solid var(--line);
      border-radius: 28px;
      padding: 28px;
      flex: 1;
    }

    header {
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.1rem, 5vw, 3.4rem);
      line-height: 1.1;
      color: var(--green);
    }

    h2 {
      margin: 0 0 18px;
      font-size: clamp(1.5rem, 3.5vw, 2.2rem);
    }

    p {
      font-size: 1.25rem;
      line-height: 1.4;
    }

    .subtitle {
      margin: 8px 0 0;
      font-size: 1.25rem;
      color: var(--muted);
    }

    button {
      border: 0;
      border-radius: 22px;
      background: var(--button);
      color: var(--text);
      min-height: 64px;
      padding: 14px 18px;
      font: inherit;
      font-size: 1.25rem;
      font-weight: 750;
      cursor: pointer;
      touch-action: manipulation;
    }

    button:active {
      transform: scale(0.98);
    }

    .primary {
      background: var(--button-dark);
      color: white;
    }

    .soft-green {
      background: var(--green-soft);
    }

    .soft-blue {
      background: var(--blue-soft);
    }

    .soft-yellow {
      background: var(--yellow-soft);
    }

    .small {
      min-height: 48px;
      border-radius: 16px;
      font-size: 1rem;
      padding: 10px 14px;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 720px) {
      .menu-grid {
        grid-template-columns: 1fr;
      }
    }

    .menu-button {
      min-height: 132px;
      text-align: left;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
    }

    .menu-icon {
      font-size: 2.1rem;
      line-height: 1;
    }

    .menu-title {
      font-size: 1.45rem;
      font-weight: 850;
    }

    .menu-sub {
      color: var(--muted);
      font-size: 1rem;
      font-weight: 650;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .badge-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .badge {
      background: #f3f4f0;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 1rem;
      font-weight: 750;
      color: var(--text);
    }

    .task-area {
      background: #fafbf8;
      border: 2px solid var(--line);
      border-radius: 28px;
      padding: 26px;
      min-height: 500px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .task-text {
      text-align: center;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 850;
      line-height: 1.25;
      margin: 4px 0 14px;
    }

    .math-text {
      text-align: center;
      font-size: clamp(2.5rem, 7vw, 5rem);
      font-weight: 900;
      line-height: 1;
      margin: 10px 0 18px;
      color: var(--green);
    }

    .visual {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin: 10px auto 18px;
      max-width: 850px;
    }

    .ball,
    .mini-ball {
      width: 58px;
      height: 58px;
      border-radius: 999px;
      border: 3px solid #cdd5cc;
      background: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.65rem;
      user-select: none;
    }

    .ball {
      cursor: pointer;
    }

    .ball.selected {
      border: 5px solid var(--green);
      background: var(--green-soft);
    }

    .mini-ball {
      width: 42px;
      height: 42px;
      font-size: 1.25rem;
    }

    .mini-ball.crossed {
      opacity: 0.4;
      position: relative;
    }

    .mini-ball.crossed::after {
      content: "";
      position: absolute;
      width: 48px;
      height: 4px;
      border-radius: 999px;
      background: #b34a4a;
      transform: rotate(-35deg);
    }

    .ten-box {
      min-width: 86px;
      height: 58px;
      border-radius: 16px;
      background: var(--blue-soft);
      border: 2px solid #c8d6e5;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: 850;
    }

    .money-note,
    .money-coin {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 850;
      border: 2px solid #d6c27a;
      background: #fff6cf;
    }

    .money-note {
      width: 90px;
      height: 52px;
      border-radius: 12px;
      font-size: 1.1rem;
    }

    .money-coin {
      width: 54px;
      height: 54px;
      border-radius: 999px;
      font-size: 1rem;
    }

    .answer-area {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    input[type="number"] {
      width: 180px;
      height: 76px;
      border: 3px solid var(--line);
      border-radius: 22px;
      background: white;
      text-align: center;
      font-size: 2.6rem;
      font-weight: 900;
      color: var(--text);
    }

    input[type="number"]:focus {
      outline: 4px solid #cfe5d6;
    }

    .number-pad {
      width: min(100%, 440px);
      margin: 16px auto 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .number-pad button {
      min-height: 66px;
      font-size: 1.75rem;
      background: white;
      border: 2px solid var(--line);
    }

    .feedback {
      min-height: 44px;
      text-align: center;
      font-size: 1.35rem;
      font-weight: 850;
      margin-top: 12px;
    }

    .feedback.good {
      color: var(--green);
    }

    .feedback.try {
      color: #8a5a00;
    }

    .help {
      display: none;
      margin-top: 16px;
      padding: 18px;
      border-radius: 22px;
      background: var(--yellow-soft);
      border: 2px solid #ead99b;
      font-size: 1.15rem;
    }

    .help.show {
      display: block;
    }

    .help strong {
      color: #5f4800;
    }

    .bottom-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .quiet-note {
      margin-top: 16px;
      color: var(--muted);
      font-size: 1rem;
      text-align: center;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>
  <main class="app">

    <section id="menuScreen" class="screen active">
      <header>
        <h1>Fußball-Mathe</h1>
        <p class="subtitle">Ruhig üben. Ohne Zeitdruck.</p>
      </header>

      <div class="card">
        <h2>Wähle eine Übung aus</h2>

        <div class="menu-grid">
          <button class="menu-button soft-green" onclick="startMode('circle')">
            <span class="menu-icon">⚽</span>
            <span class="menu-title">Bälle einkreisen</span>
            <span class="menu-sub">Zählen und antippen</span>
          </button>

          <button class="menu-button soft-blue" onclick="startMode('plus')">
            <span class="menu-icon">⚽ + ⚽</span>
            <span class="menu-title">Plus</span>
            <span class="menu-sub">Zusammenrechnen</span>
          </button>

          <button class="menu-button soft-blue" onclick="startMode('minus')">
            <span class="menu-icon">🚌 − ⚽</span>
            <span class="menu-title">Minus</span>
            <span class="menu-sub">Wegnehmen</span>
          </button>

          <button class="menu-button soft-yellow" onclick="startMode('missing')">
            <span class="menu-icon">🚩 ?</span>
            <span class="menu-title">Fehlende Zahl</span>
            <span class="menu-sub">Was fehlt?</span>
          </button>

          <button class="menu-button soft-yellow" onclick="startMode('moneyAdd')">
            <span class="menu-icon">💶 + 💶</span>
            <span class="menu-title">Euro zusammen</span>
            <span class="menu-sub">Fan-Shop</span>
          </button>

          <button class="menu-button soft-yellow" onclick="startMode('change')">
            <span class="menu-icon">👕 💶</span>
            <span class="menu-title">Wechselgeld</span>
            <span class="menu-sub">Bezahlen und zurückbekommen</span>
          </button>
        </div>

        <p class="quiet-note">
          Die Schwierigkeit steigt langsam: 10, 11, 12 …
        </p>
      </div>
    </section>

    <section id="gameScreen" class="screen">
      <div class="topbar">
        <button class="small" onclick="goMenu()">← Auswahl</button>

        <div class="badge-row">
          <span class="badge" id="modeBadge">Übung</span>
          <span class="badge" id="rangeBadge">ZR bis 10</span>
          <span class="badge" id="streakBadge">Serie: 0</span>
        </div>
      </div>

      <div class="card">
        <div class="task-area">
          <div>
            <div id="taskText" class="task-text"></div>
            <div id="mathText" class="math-text"></div>
            <div id="visual" class="visual"></div>
          </div>

          <div>
            <div id="inputArea" class="answer-area">
              <input
                id="answerInput"
                type="number"
                inputmode="numeric"
                pattern="[0-9]*"
                placeholder="?"
                aria-label="Antwort"
              />
              <button class="primary" onclick="checkAnswer()">Prüfen</button>
            </div>

            <div id="pad" class="number-pad">
              <button onclick="pressNumber('1')">1</button>
              <button onclick="pressNumber('2')">2</button>
              <button onclick="pressNumber('3')">3</button>
              <button onclick="pressNumber('4')">4</button>
              <button onclick="pressNumber('5')">5</button>
              <button onclick="pressNumber('6')">6</button>
              <button onclick="pressNumber('7')">7</button>
              <button onclick="pressNumber('8')">8</button>
              <button onclick="pressNumber('9')">9</button>
              <button onclick="deleteNumber()">⌫</button>
              <button onclick="pressNumber('0')">0</button>
              <button onclick="checkAnswer()">✓</button>
            </div>

            <div id="circleCheckArea" class="answer-area hidden">
              <button class="primary" onclick="checkAnswer()">Fertig</button>
            </div>

            <div class="bottom-row">
              <button onclick="toggleHelp()">Hilfe</button>
              <button onclick="newTask()">Neue Aufgabe</button>
            </div>

            <div id="feedback" class="feedback"></div>

            <div id="helpBox" class="help"></div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <script>
    const menuScreen = document.getElementById("menuScreen");
    const gameScreen = document.getElementById("gameScreen");

    const modeBadge = document.getElementById("modeBadge");
    const rangeBadge = document.getElementById("rangeBadge");
    const streakBadge = document.getElementById("streakBadge");

    const taskText = document.getElementById("taskText");
    const mathText = document.getElementById("mathText");
    const visual = document.getElementById("visual");

    const answerInput = document.getElementById("answerInput");
    const inputArea = document.getElementById("inputArea");
    const pad = document.getElementById("pad");
    const circleCheckArea = document.getElementById("circleCheckArea");

    const feedback = document.getElementById("feedback");
    const helpBox = document.getElementById("helpBox");

    let mode = "plus";
    let range = 10;
    let currentAnswer = 0;
    let correctStreak = 0;
    let wrongStreak = 0;

    const minRange = 5;
    const maxRangeDefault = 100;
    const maxRangeCircle = 30;

    const modeNames = {
      circle: "Bälle einkreisen",
      plus: "Plus",
      minus: "Minus",
      missing: "Fehlende Zahl",
      moneyAdd: "Euro zusammen",
      change: "Wechselgeld"
    };

    function startMode(selectedMode) {
      mode = selectedMode;
      range = 10;
      correctStreak = 0;
      wrongStreak = 0;

      menuScreen.classList.remove("active");
      gameScreen.classList.add("active");

      newTask();
    }

    function goMenu() {
      gameScreen.classList.remove("active");
      menuScreen.classList.add("active");
    }

    function updateBadges() {
      modeBadge.textContent = modeNames[mode];
      rangeBadge.textContent = "ZR bis " + range;
      streakBadge.textContent = "Serie: " + correctStreak;
    }

    function maxForMode() {
      if (mode === "circle") return maxRangeCircle;
      return maxRangeDefault;
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function pick(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function newTask() {
      feedback.textContent = "";
      feedback.className = "feedback";
      helpBox.classList.remove("show");
      helpBox.innerHTML = "";
      answerInput.value = "";
      visual.innerHTML = "";
      mathText.textContent = "";

      if (mode === "circle") makeCircleTask();
      if (mode === "plus") makePlusTask();
      if (mode === "minus") makeMinusTask();
      if (mode === "missing") makeMissingTask();
      if (mode === "moneyAdd") makeMoneyAddTask();
      if (mode === "change") makeChangeTask();

      updateBadges();

      if (mode !== "circle") {
        setTimeout(() => answerInput.focus(), 100);
      }
    }

    function showInputTask() {
      inputArea.classList.remove("hidden");
      pad.classList.remove("hidden");
      circleCheckArea.classList.add("hidden");
    }

    function showCircleTask() {
      inputArea.classList.add("hidden");
      pad.classList.add("hidden");
      circleCheckArea.classList.remove("hidden");
    }

    function makeCircleTask() {
      showCircleTask();

      const total = Math.min(range, maxRangeCircle);
      const target = randomInt(1, total);

      currentAnswer = target;

      taskText.textContent = "Kreise " + target + " Fußbälle ein.";
      mathText.textContent = "";

      for (let i = 0; i < total; i++) {
        const ball = document.createElement("button");
        ball.className = "ball";
        ball.textContent = "⚽";
        ball.setAttribute("aria-label", "Fußball");
        ball.onclick = function () {
          ball.classList.toggle("selected");
        };
        visual.appendChild(ball);
      }

      helpBox.innerHTML = `
        <p><strong>Tippe genau ${target} Fußbälle an.</strong></p>
        <p>Jeder angetippte Ball bekommt einen grünen Kreis.</p>
      `;
    }

    function makePlusTask() {
      showInputTask();

      const a = randomInt(1, range - 1);
      const b = randomInt(1, range - a);

      currentAnswer = a + b;

      taskText.textContent = "Im Training liegen erst " + a + " Bälle. Dann kommen " + b + " Bälle dazu.";
      mathText.textContent = a + " + " + b + " = ?";
      visual.innerHTML = visualNumber(a, "⚽") + visualSign("+") + visualNumber(b, "⚽");

      helpBox.innerHTML = `
        <p><strong>Plus bedeutet: zusammenlegen.</strong></p>
        <p>Zähle erst ${a}. Dann zähle ${b} dazu.</p>
      `;
    }

    function makeMinusTask() {
      showInputTask();

      const a = randomInt(2, range);
      const b = randomInt(1, a - 1);

      currentAnswer = a - b;

      const story = pick([
        "Im Mannschaftsbus sitzen " + a + " Fans. " + b + " Fans steigen aus.",
        "Im Stadion hängen " + a + " Fähnchen. " + b + " Fähnchen werden abgenommen.",
        "Die Mannschaft hat " + a + " Bälle. " + b + " Bälle werden weggeräumt."
      ]);

      taskText.textContent = story;
      mathText.textContent = a + " − " + b + " = ?";
      visual.innerHTML = visualMinus(a, b);

      helpBox.innerHTML = `
        <p><strong>Minus bedeutet: wegnehmen.</strong></p>
        <p>Starte bei ${a}. Nimm ${b} weg. Zähle, was übrig bleibt.</p>
      `;
    }

    function makeMissingTask() {
      showInputTask();

      const total = randomInt(2, range);
      const there = randomInt(1, total - 1);

      currentAnswer = total - there;

      taskText.textContent = "Im Stadion sollen " + total + " Fähnchen hängen. Es hängen schon " + there + ".";
      mathText.textContent = there + " + ? = " + total;
      visual.innerHTML = visualNumber(there, "🚩") + visualSign("+ ?") + visualSign("=") + visualNumber(total, "🚩");

      helpBox.innerHTML = `
        <p><strong>Was fehlt bis ${total}?</strong></p>
        <p>Zähle von ${there} weiter bis ${total}.</p>
      `;
    }

    function makeMoneyAddTask() {
      showInputTask();

      const a = randomInt(1, range - 1);
      const b = randomInt(1, range - a);

      currentAnswer = a + b;

      taskText.textContent = "Ein Schal kostet " + a + " €. Ein Fähnchen kostet " + b + " €.";
      mathText.textContent = a + " € + " + b + " € = ?";
      visual.innerHTML = visualMoney(a) + visualSign("+") + visualMoney(b);

      helpBox.innerHTML = `
        <p><strong>Lege die Euro-Beträge zusammen.</strong></p>
        <p>${a} € und ${b} € gehören zusammen.</p>
      `;
    }

    function makeChangeTask() {
      showInputTask();

      const paid = randomInt(2, range);
      const price = randomInt(1, paid - 1);

      currentAnswer = paid - price;

      taskText.textContent = "Du kaufst im Fan-Shop etwas für " + price + " €. Du bezahlst mit " + paid + " €.";
      mathText.textContent = paid + " € − " + price + " € = ?";
      visual.innerHTML = visualMoney(paid) + visualSign("− " + price + " €");

      helpBox.innerHTML = `
        <p><strong>Wechselgeld bedeutet: bezahlt minus Preis.</strong></p>
        <p>Rechne: ${paid} € − ${price} €.</p>
      `;
    }

    function visualSign(sign) {
      return `<div class="ten-box">${sign}</div>`;
    }

    function visualNumber(number, symbol) {
      if (number <= 20) {
        let html = "";
        for (let i = 0; i < number; i++) {
          html += `<span class="mini-ball">${symbol}</span>`;
        }
        return html;
      }

      const tens = Math.floor(number / 10);
      const ones = number % 10;
      let html = "";

      for (let i = 0; i < tens; i++) {
        html += `<span class="ten-box">10</span>`;
      }

      for (let i = 0; i < ones; i++) {
        html += `<span class="mini-ball">${symbol}</span>`;
      }

      return html;
    }

    function visualMinus(start, takeAway) {
      if (start <= 20) {
        let html = "";

        for (let i = 1; i <= start; i++) {
          const crossed = i <= takeAway ? "crossed" : "";
          html += `<span class="mini-ball ${crossed}">⚽</span>`;
        }

        return html;
      }

      return visualNumber(start, "⚽") + visualSign("− " + takeAway);
    }

    function visualMoney(amount) {
      let html = "";

      const notes = [50, 20, 10, 5];

      for (const note of notes) {
        while (amount >= note) {
          html += `<span class="money-note">${note} €</span>`;
          amount -= note;
        }
      }

      while (amount >= 1) {
        html += `<span class="money-coin">1 €</span>`;
        amount -= 1;
      }

      return html;
    }

    function checkAnswer() {
      let userAnswer;

      if (mode === "circle") {
        userAnswer = document.querySelectorAll(".ball.selected").length;
      } else {
        if (answerInput.value.trim() === "") {
          feedback.textContent = "Gib eine Zahl ein.";
          feedback.className = "feedback try";
          return;
        }

        userAnswer = Number(answerInput.value);
      }

      if (userAnswer === currentAnswer) {
        correctStreak++;
        wrongStreak = 0;

        feedback.textContent = pick([
          "Richtig.",
          "Gut gerechnet.",
          "Das stimmt.",
          "Sehr gut."
        ]);
        feedback.className = "feedback good";

        if (correctStreak >= 20) {
          increaseRange();
          correctStreak = 0;
          feedback.textContent = "Sehr gut. Jetzt wird es ein kleines bisschen schwerer.";
        }

        updateBadges();

        setTimeout(newTask, 900);
      } else {
        wrongStreak++;
        correctStreak = 0;

        feedback.textContent = "Noch nicht. Schau auf die Hilfe.";
        feedback.className = "feedback try";
        helpBox.classList.add("show");

        if (wrongStreak >= 5) {
          decreaseRange();
          wrongStreak = 0;
          feedback.textContent = "Wir machen es ein kleines bisschen leichter.";
        }

        updateBadges();
      }
    }

    function increaseRange() {
      const max = maxForMode();
      if (range < max) {
        range = range + 1;
      }
    }

    function decreaseRange() {
      if (range > minRange) {
        range = range - 1;
      }
    }

    function toggleHelp() {
      helpBox.classList.toggle("show");
    }

    function pressNumber(number) {
      if (answerInput.value.length < 3) {
        answerInput.value += number;
      }
      answerInput.focus();
    }

    function deleteNumber() {
      answerInput.value = answerInput.value.slice(0, -1);
      answerInput.focus();
    }

    answerInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        checkAnswer();
      }
    });
  </script>
</body>
</html>
