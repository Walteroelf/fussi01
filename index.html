<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Fußballfänger Mathe</title>

  <style>
    :root {
      --bg: #f3f5ef;
      --card: #ffffff;
      --text: #1f2933;
      --muted: #667085;
      --line: #d9ded3;
      --green: #2f6f4e;
      --green-dark: #24543c;
      --green-soft: #e8f3ec;
      --yellow-soft: #fff7dc;
      --red-soft: #fdecec;
      --blue-soft: #edf4fb;
      --shadow: rgba(31, 41, 51, 0.08);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 1080px;
      min-height: 100svh;
      padding: 24px;
      display: flex;
      flex-direction: column;
    }

    .screen {
      display: none;
      flex: 1;
    }

    .screen.active {
      display: flex;
      flex-direction: column;
    }

    h1 {
      margin: 0;
      color: var(--green);
      font-size: clamp(2.4rem, 5vw, 4rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    h2 {
      margin: 0 0 18px;
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      line-height: 1.15;
    }

    p {
      font-size: 1.2rem;
      line-height: 1.45;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 1.25rem;
    }

    .card {
      background: var(--card);
      border: 2px solid var(--line);
      border-radius: 32px;
      padding: 28px;
      box-shadow: 0 10px 30px var(--shadow);
    }

    button {
      font: inherit;
      border: 0;
      border-radius: 24px;
      min-height: 64px;
      padding: 14px 20px;
      background: #eef0eb;
      color: var(--text);
      font-size: 1.2rem;
      font-weight: 750;
      cursor: pointer;
      touch-action: manipulation;
    }

    button:active {
      transform: scale(0.98);
    }

    .primary {
      background: var(--green);
      color: white;
    }

    .small {
      min-height: 48px;
      padding: 10px 16px;
      border-radius: 16px;
      font-size: 1rem;
    }

    /* Startseite */

    .start-header {
      margin-bottom: 22px;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    @media (max-width: 760px) {
      .mode-grid {
        grid-template-columns: 1fr;
      }
    }

    .mode-button {
      min-height: 132px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      text-align: left;
      gap: 8px;
      background: #f7f8f4;
      border: 2px solid var(--line);
    }

    .mode-button.mix {
      background: var(--green-soft);
      border-color: #cfe2d6;
    }

    .mode-icon {
      font-size: 2rem;
      line-height: 1;
    }

    .mode-title {
      font-size: 1.45rem;
      font-weight: 850;
    }

    .mode-sub {
      color: var(--muted);
      font-size: 1rem;
      font-weight: 650;
    }

    .quiet-note {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 1rem;
      text-align: center;
    }

    /* Spielseite */

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .badges {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .badge {
      background: white;
      border: 2px solid var(--line);
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 1rem;
      font-weight: 750;
      color: var(--text);
    }

    .game-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0;
      overflow: hidden;
    }

    .field {
      flex: 1;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.18) 1px, transparent 1px),
        linear-gradient(#eef7ec, #e7f1e4);
      background-size: 80px 80px;
      padding: 26px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 660px;
    }

    @media (max-height: 780px) {
      .field {
        min-height: 560px;
      }
    }

    .task-box {
      background: rgba(255,255,255,0.92);
      border: 2px solid var(--line);
      border-radius: 28px;
      padding: 24px;
      text-align: center;
    }

    .task-type {
      color: var(--muted);
      font-size: 1.05rem;
      font-weight: 750;
      margin-bottom: 8px;
    }

    .task-text {
      font-size: clamp(1.5rem, 3.6vw, 2.5rem);
      line-height: 1.25;
      font-weight: 850;
      margin-bottom: 12px;
    }

    .math-text {
      font-size: clamp(2.8rem, 7vw, 5.6rem);
      line-height: 1;
      font-weight: 950;
      color: var(--green-dark);
      letter-spacing: -0.04em;
    }

    .visual {
      margin-top: 18px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      min-height: 70px;
    }

    .mini {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      background: white;
      border: 2px solid #cfd7cc;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      font-size: 1.25rem;
      position: relative;
    }

    .mini.crossed {
      opacity: 0.45;
    }

    .mini.crossed::after {
      content: "";
      position: absolute;
      width: 50px;
      height: 4px;
      border-radius: 99px;
      background: #a74646;
      transform: rotate(-35deg);
    }

    .ten {
      min-width: 78px;
      height: 48px;
      border-radius: 16px;
      background: var(--blue-soft);
      border: 2px solid #c9d7e6;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1rem;
    }

    .money-note,
    .money-coin {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #fff5cc;
      border: 2px solid #d8c27a;
      font-weight: 900;
    }

    .money-note {
      width: 86px;
      height: 48px;
      border-radius: 12px;
      font-size: 1.05rem;
    }

    .money-coin {
      width: 50px;
      height: 50px;
      border-radius: 999px;
      font-size: 1rem;
    }

    .answer-zone {
      margin-top: 22px;
    }

    .goal-label {
      text-align: center;
      color: var(--green-dark);
      font-size: 1.15rem;
      font-weight: 850;
      margin-bottom: 12px;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    @media (max-width: 760px) {
      .answers {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .answer-ball {
      min-height: 118px;
      border-radius: 28px;
      background: white;
      border: 3px solid #ccd5ca;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 6px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.05);
    }

    .answer-ball.correct {
      background: var(--green-soft);
      border-color: var(--green);
    }

    .answer-ball.wrong {
      background: var(--red-soft);
      border-color: #d8a0a0;
    }

    .ball-icon {
      font-size: 2rem;
      line-height: 1;
    }

    .ball-number {
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1;
      font-weight: 950;
      color: var(--green-dark);
    }

    .feedback {
      min-height: 48px;
      margin-top: 14px;
      text-align: center;
      font-size: 1.35rem;
      font-weight: 850;
    }

    .feedback.good {
      color: var(--green-dark);
    }

    .feedback.try {
      color: #8a5a00;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .help {
      display: none;
      margin-top: 14px;
      background: var(--yellow-soft);
      border: 2px solid #e5d08a;
      border-radius: 24px;
      padding: 18px;
      text-align: center;
    }

    .help.show {
      display: block;
    }

    .help p {
      margin: 8px 0;
      font-size: 1.1rem;
    }

    .help strong {
      color: #5f4800;
    }
  </style>
</head>

<body>
  <main class="app">

    <!-- Startseite -->
    <section id="menuScreen" class="screen active">
      <header class="start-header">
        <h1>Fußballfänger</h1>
        <p class="subtitle">Fange den richtigen Ball.</p>
      </header>

      <div class="card">
        <h2>Was möchtest du üben?</h2>

        <div class="mode-grid">
          <button class="mode-button mix" onclick="startGame('mix')">
            <span class="mode-icon">⚽</span>
            <span class="mode-title">Gemischt</span>
            <span class="mode-sub">Plus, Minus, Zählen und Euro</span>
          </button>

          <button class="mode-button" onclick="startGame('count')">
            <span class="mode-icon">⚽ ⚽ ⚽</span>
            <span class="mode-title">Bälle zählen</span>
            <span class="mode-sub">Wie viele sind es?</span>
          </button>

          <button class="mode-button" onclick="startGame('plus')">
            <span class="mode-icon">⚽ + ⚽</span>
            <span class="mode-title">Plus</span>
            <span class="mode-sub">Zusammenrechnen</span>
          </button>

          <button class="mode-button" onclick="startGame('minus')">
            <span class="mode-icon">🚌 − ⚽</span>
            <span class="mode-title">Minus</span>
            <span class="mode-sub">Wegnehmen</span>
          </button>

          <button class="mode-button" onclick="startGame('missing')">
            <span class="mode-icon">🚩 ?</span>
            <span class="mode-title">Fehlende Zahl</span>
            <span class="mode-sub">Was fehlt bis zur Zielzahl?</span>
          </button>

          <button class="mode-button" onclick="startGame('money')">
            <span class="mode-icon">💶</span>
            <span class="mode-title">Euro</span>
            <span class="mode-sub">Fan-Shop und Wechselgeld</span>
          </button>
        </div>

        <p class="quiet-note">
          Ruhige Darstellung. Kein Zeitdruck. Der Zahlenraum wächst langsam: 10, 11, 12 …
        </p>
      </div>
    </section>

    <!-- Spielseite -->
    <section id="gameScreen" class="screen">
      <div class="topbar">
        <button class="small" onclick="goMenu()">← Auswahl</button>

        <div class="badges">
          <span class="badge" id="modeBadge">Gemischt</span>
          <span class="badge" id="rangeBadge">ZR bis 10</span>
          <span class="badge" id="streakBadge">Serie: 0</span>
          <span class="badge" id="scoreBadge">Punkte: 0</span>
        </div>
      </div>

      <div class="card game-card">
        <div class="field">

          <div class="task-box">
            <div class="task-type" id="taskType">Aufgabe</div>
            <div class="task-text" id="taskText">Fange den richtigen Ball.</div>
            <div class="math-text" id="mathText"></div>
            <div class="visual" id="visual"></div>
          </div>

          <div class="answer-zone">
            <div class="goal-label">Tippe auf den richtigen Fußball.</div>
            <div class="answers" id="answers"></div>

            <div class="feedback" id="feedback"></div>

            <div class="controls">
              <button onclick="toggleHelp()">Hilfe</button>
              <button onclick="newTask()">Neue Aufgabe</button>
            </div>

            <div class="help" id="helpBox"></div>
          </div>

        </div>
      </div>
    </section>

  </main>

  <script>
    const menuScreen = document.getElementById("menuScreen");
    const gameScreen = document.getElementById("gameScreen");

    const modeBadge = document.getElementById("modeBadge");
    const rangeBadge = document.getElementById("rangeBadge");
    const streakBadge = document.getElementById("streakBadge");
    const scoreBadge = document.getElementById("scoreBadge");

    const taskType = document.getElementById("taskType");
    const taskText = document.getElementById("taskText");
    const mathText = document.getElementById("mathText");
    const visual = document.getElementById("visual");
    const answers = document.getElementById("answers");
    const feedback = document.getElementById("feedback");
    const helpBox = document.getElementById("helpBox");

    let selectedMode = "mix";
    let currentMode = "plus";
    let range = 10;

    let currentAnswer = 0;
    let correctStreak = 0;
    let wrongStreak = 0;
    let score = 0;
    let locked = false;

    const minRange = 5;
    const maxRange = 100;

    const modeNames = {
      mix: "Gemischt",
      count: "Bälle zählen",
      plus: "Plus",
      minus: "Minus",
      missing: "Fehlende Zahl",
      money: "Euro"
    };

    function startGame(mode) {
      selectedMode = mode;
      range = 10;
      correctStreak = 0;
      wrongStreak = 0;
      score = 0;

      menuScreen.classList.remove("active");
      gameScreen.classList.add("active");

      newTask();
    }

    function goMenu() {
      gameScreen.classList.remove("active");
      menuScreen.classList.add("active");
    }

    function updateBadges() {
      modeBadge.textContent = modeNames[selectedMode];
      rangeBadge.textContent = "ZR bis " + range;
      streakBadge.textContent = "Serie: " + correctStreak;
      scoreBadge.textContent = "Punkte: " + score;
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function pick(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function newTask() {
      locked = false;
      feedback.textContent = "";
      feedback.className = "feedback";
      helpBox.classList.remove("show");
      helpBox.innerHTML = "";
      visual.innerHTML = "";
      answers.innerHTML = "";

      if (selectedMode === "mix") {
        currentMode = pick(["count", "plus", "minus", "missing", "money"]);
      } else {
        currentMode = selectedMode;
      }

      if (currentMode === "count") createCountTask();
      if (currentMode === "plus") createPlusTask();
      if (currentMode === "minus") createMinusTask();
      if (currentMode === "missing") createMissingTask();
      if (currentMode === "money") createMoneyTask();

      renderAnswers(currentAnswer);
      updateBadges();
    }

    function createCountTask() {
      const amount = randomInt(1, Math.min(range, 30));
      currentAnswer = amount;

      taskType.textContent = "Bälle zählen";
      taskText.textContent = "Wie viele Fußbälle siehst du?";
      mathText.textContent = "";
      visual.innerHTML = visualObjects(amount, "⚽");

      helpBox.innerHTML = `
        <p><strong>Zähle jeden Ball einmal.</strong></p>
        <div class="visual">${visualObjects(amount, "⚽")}</div>
      `;
    }

    function createPlusTask() {
      const a = randomInt(1, range - 1);
      const b = randomInt(1, range - a);
      currentAnswer = a + b;

      taskType.textContent = "Plus";
      taskText.textContent = "Im Training liegen Bälle. Es kommen Bälle dazu.";
      mathText.textContent = a + " + " + b;
      visual.innerHTML = visualObjects(a, "⚽") + sign("+") + visualObjects(b, "⚽");

      helpBox.innerHTML = `
        <p><strong>Plus heißt: zusammenlegen.</strong></p>
        <p>Zähle erst ${a}. Dann zähle ${b} dazu.</p>
        <div class="visual">${visualObjects(a, "⚽")}${sign("+")}${visualObjects(b, "⚽")}</div>
      `;
    }

    function createMinusTask() {
      const a = randomInt(2, range);
      const b = randomInt(1, a - 1);
      currentAnswer = a - b;

      const stories = [
        "Im Mannschaftsbus sitzen Fans. Einige steigen aus.",
        "Im Stadion hängen Fähnchen. Einige werden abgenommen.",
        "Die Mannschaft hat Bälle. Einige werden weggeräumt."
      ];

      taskType.textContent = "Minus";
      taskText.textContent = pick(stories);
      mathText.textContent = a + " − " + b;
      visual.innerHTML = visualMinus(a, b, "⚽");

      helpBox.innerHTML = `
        <p><strong>Minus heißt: wegnehmen.</strong></p>
        <p>Starte mit ${a}. Nimm ${b} weg. Was bleibt übrig?</p>
        <div class="visual">${visualMinus(a, b, "⚽")}</div>
      `;
    }

    function createMissingTask() {
      const total = randomInt(2, range);
      const known = randomInt(1, total - 1);
      currentAnswer = total - known;

      taskType.textContent = "Fehlende Zahl";
      taskText.textContent = "Im Stadion sollen genug Fähnchen hängen.";
      mathText.textContent = known + " + ? = " + total;
      visual.innerHTML = visualObjects(known, "🚩") + sign("+ ?") + sign("= " + total);

      helpBox.innerHTML = `
        <p><strong>Zähle weiter bis ${total}.</strong></p>
        <p>Du startest bei ${known}. Wie viele fehlen noch?</p>
        <div class="visual">${visualObjects(known, "🚩")}${sign("+ ?")}${sign("= " + total)}</div>
      `;
    }

    function createMoneyTask() {
      const taskKind = pick(["add", "change"]);

      if (taskKind === "add" || range < 8) {
        const a = randomInt(1, range - 1);
        const b = randomInt(1, range - a);
        currentAnswer = a + b;

        taskType.textContent = "Euro";
        taskText.textContent = "Im Fan-Shop kaufst du zwei Dinge.";
        mathText.textContent = a + " € + " + b + " €";
        visual.innerHTML = visualMoney(a) + sign("+") + visualMoney(b);

        helpBox.innerHTML = `
          <p><strong>Lege die Euro-Beträge zusammen.</strong></p>
          <p>${a} € und ${b} € gehören zusammen.</p>
          <div class="visual">${visualMoney(a)}${sign("+")}${visualMoney(b)}</div>
        `;
      } else {
        const paid = randomInt(2, range);
        const price = randomInt(1, paid - 1);
        currentAnswer = paid - price;

        taskType.textContent = "Wechselgeld";
        taskText.textContent = "Du bezahlst im Fan-Shop. Wie viel bekommst du zurück?";
        mathText.textContent = paid + " € − " + price + " €";
        visual.innerHTML = visualMoney(paid) + sign("− " + price + " €");

        helpBox.innerHTML = `
          <p><strong>Wechselgeld heißt: bezahlt minus Preis.</strong></p>
          <p>Rechne ${paid} € − ${price} €.</p>
          <div class="visual">${visualMoney(paid)}${sign("− " + price + " €")}</div>
        `;
      }
    }

    function renderAnswers(answer) {
      const options = createOptions(answer);

      options.forEach(option => {
        const btn = document.createElement("button");
        btn.className = "answer-ball";
        btn.innerHTML = `
          <span class="ball-icon">⚽</span>
          <span class="ball-number">${option}</span>
        `;

        btn.onclick = function () {
          checkAnswer(option, btn);
        };

        answers.appendChild(btn);
      });
    }

    function createOptions(answer) {
      const set = new Set();
      set.add(answer);

      let tries = 0;

      while (set.size < 4 && tries < 100) {
        tries++;

        const distance = randomInt(1, Math.max(2, Math.ceil(range / 5)));
        const signValue = Math.random() < 0.5 ? -1 : 1;
        let option = answer + signValue * distance;

        if (Math.random() < 0.25) {
          option = randomInt(1, Math.max(4, range));
        }

        if (option >= 0 && option <= Math.max(range, answer + 5)) {
          set.add(option);
        }
      }

      while (set.size < 4) {
        set.add(randomInt(0, Math.max(range, answer + 5)));
      }

      return Array.from(set).sort(() => Math.random() - 0.5);
    }

    function checkAnswer(value, button) {
      if (locked) return;

      if (value === currentAnswer) {
        locked = true;

        button.classList.add("correct");
        correctStreak++;
        wrongStreak = 0;
        score++;

        feedback.textContent = pick([
          "Richtig.",
          "Gut gefangen.",
          "Das stimmt.",
          "Sehr gut."
        ]);
        feedback.className = "feedback good";

        if (correctStreak >= 20) {
          increaseRange();
          correctStreak = 0;
          feedback.textContent = "Sehr gut. Der Zahlenraum wird um 1 größer.";
        }

        updateBadges();

        setTimeout(newTask, 900);
      } else {
        button.classList.add("wrong");
        wrongStreak++;
        correctStreak = 0;

        feedback.textContent = "Noch nicht. Schau auf die Hilfe.";
        feedback.className = "feedback try";
        helpBox.classList.add("show");

        if (wrongStreak >= 5) {
          decreaseRange();
          wrongStreak = 0;
          feedback.textContent = "Wir machen es um 1 leichter.";
        }

        updateBadges();
      }
    }

    function increaseRange() {
      if (range < maxRange) {
        range = range + 1;
      }
    }

    function decreaseRange() {
      if (range > minRange) {
        range = range - 1;
      }
    }

    function toggleHelp() {
      helpBox.classList.toggle("show");
    }

    function sign(text) {
      return `<span class="ten">${text}</span>`;
    }

    function visualObjects(amount, symbol) {
      if (amount <= 20) {
        let html = "";
        for (let i = 0; i < amount; i++) {
          html += `<span class="mini">${symbol}</span>`;
        }
        return html;
      }

      const tens = Math.floor(amount / 10);
      const ones = amount % 10;
      let html = "";

      for (let i = 0; i < tens; i++) {
        html += `<span class="ten">10</span>`;
      }

      for (let i = 0; i < ones; i++) {
        html += `<span class="mini">${symbol}</span>`;
      }

      return html;
    }

    function visualMinus(start, takeAway, symbol) {
      if (start <= 20) {
        let html = "";

        for (let i = 1; i <= start; i++) {
          const crossed = i <= takeAway ? "crossed" : "";
          html += `<span class="mini ${crossed}">${symbol}</span>`;
        }

        return html;
      }

      return visualObjects(start, symbol) + sign("− " + takeAway);
    }

    function visualMoney(amount) {
      let html = "";
      const values = [50, 20, 10, 5];

      for (const value of values) {
        while (amount >= value) {
          html += `<span class="money-note">${value} €</span>`;
          amount -= value;
        }
      }

      while (amount >= 1) {
        html += `<span class="money-coin">1 €</span>`;
        amount--;
      }

      return html;
    }
  </script>
</body>
</html>
