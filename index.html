<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fußball-Mathe</title>

  <style>
    :root {
      --green: #1f8f4d;
      --dark: #153b2b;
      --light: #f4fff8;
      --yellow: #ffd84d;
      --red: #e85d5d;
      --blue: #3b82f6;
      --gray: #e8efe9;
      --text: #1f2937;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eafff1, #ffffff);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 900px;
      padding: 18px;
    }

    .card {
      background: white;
      border-radius: 28px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      border: 3px solid #d7f2df;
    }

    header {
      text-align: center;
      margin-bottom: 16px;
    }

    h1 {
      margin: 8px 0;
      font-size: clamp(2rem, 6vw, 3.2rem);
      color: var(--green);
    }

    h2 {
      font-size: clamp(1.5rem, 4vw, 2.1rem);
      margin: 8px 0 18px;
    }

    p {
      font-size: 1.25rem;
      line-height: 1.4;
    }

    .subtitle {
      font-size: 1.2rem;
      color: #446052;
      margin-top: 0;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 18px;
    }

    @media (min-width: 700px) {
      .menu-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    button {
      font: inherit;
      border: none;
      cursor: pointer;
      border-radius: 22px;
      min-height: 64px;
      padding: 14px 18px;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      background: var(--gray);
      transition: transform 0.08s ease, box-shadow 0.08s ease;
      touch-action: manipulation;
    }

    button:active {
      transform: scale(0.97);
    }

    .big-button {
      min-height: 130px;
      font-size: 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .primary {
      background: var(--green);
      color: white;
    }

    .yellow {
      background: var(--yellow);
    }

    .blue {
      background: var(--blue);
      color: white;
    }

    .red {
      background: var(--red);
      color: white;
    }

    .small {
      min-height: 48px;
      padding: 10px 14px;
      font-size: 1rem;
      border-radius: 16px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #eefbf2;
      border: 2px solid #ccebd5;
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 1rem;
    }

    .task-box {
      background: #f7fff9;
      border: 3px solid #d7f2df;
      border-radius: 28px;
      padding: 24px;
      text-align: center;
      margin: 16px 0;
    }

    .story {
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 800;
      margin: 8px 0 16px;
    }

    .math {
      font-size: clamp(2.2rem, 8vw, 4rem);
      font-weight: 900;
      color: var(--dark);
      margin: 14px 0;
    }

    .answer-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    input[type="number"] {
      width: min(100%, 260px);
      font-size: 2.4rem;
      text-align: center;
      border: 4px solid #ccebd5;
      border-radius: 22px;
      padding: 14px;
      font-weight: 800;
      background: white;
    }

    input[type="number"]:focus {
      outline: 4px solid #a7f3d0;
    }

    .number-pad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 18px;
      max-width: 430px;
      margin-left: auto;
      margin-right: auto;
    }

    .number-pad button {
      font-size: 1.8rem;
      min-height: 70px;
      background: #eefbf2;
      border: 2px solid #ccebd5;
    }

    .feedback {
      min-height: 56px;
      margin-top: 14px;
      font-size: 1.5rem;
      font-weight: 800;
      text-align: center;
    }

    .feedback.good {
      color: var(--green);
    }

    .feedback.try {
      color: #c47a00;
    }

    .help-panel {
      display: none;
      margin-top: 18px;
      background: #fffdf0;
      border: 3px solid #ffe39a;
      border-radius: 24px;
      padding: 18px;
    }

    .help-panel.show {
      display: block;
    }

    .help-title {
      font-size: 1.4rem;
      font-weight: 900;
      margin-bottom: 12px;
      color: #795a00;
    }

    .visual-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin: 12px 0;
    }

    .icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: white;
      border: 2px solid #d1d5db;
      font-size: 1.55rem;
      position: relative;
    }

    .icon.cross::after {
      content: "";
      position: absolute;
      width: 54px;
      height: 5px;
      background: var(--red);
      transform: rotate(-35deg);
      border-radius: 99px;
    }

    .ten-block {
      min-width: 92px;
      min-height: 64px;
      padding: 8px;
      border-radius: 18px;
      background: #e0f2fe;
      border: 3px solid #7dd3fc;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-weight: 900;
      color: #075985;
    }

    .coin {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: #ffe08a;
      border: 3px solid #d49b00;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1.1rem;
    }

    .note {
      width: 88px;
      height: 48px;
      border-radius: 12px;
      background: #a7f3d0;
      border: 3px solid #34d399;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1.1rem;
    }

    .progress {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 14px;
    }

    @media (min-width: 650px) {
      .progress {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .progress-item {
      background: #f3f4f6;
      border-radius: 18px;
      padding: 12px;
      text-align: center;
      font-weight: 800;
    }

    .footer-note {
      margin-top: 14px;
      text-align: center;
      color: #52665b;
      font-size: 0.95rem;
    }
  </style>
</head>

<body>
  <main class="app">
    <header>
      <h1>⚽ Fußball-Mathe</h1>
      <p class="subtitle">Rechnen mit Bällen, Bussen, Stadien und Fan-Shop</p>
    </header>

    <!-- Startmenü -->
    <section id="menu" class="screen active">
      <div class="card">
        <h2>Was möchtest du üben?</h2>

        <div class="menu-grid">
          <button class="big-button primary" onclick="startGame('plus')">
            <span style="font-size:2.5rem;">⚽➕⚽</span>
            Plus rechnen
            <small>bis 100</small>
          </button>

          <button class="big-button yellow" onclick="startGame('minus')">
            <span style="font-size:2.5rem;">🚌➖👧</span>
            Minus rechnen
            <small>bis 100</small>
          </button>

          <button class="big-button blue" onclick="startGame('money')">
            <span style="font-size:2.5rem;">🏟️💶</span>
            Rechnen mit Euro
            <small>ganze Euro-Beträge</small>
          </button>
        </div>

        <p class="footer-note">
          Kein Zeitdruck. Du kannst immer auf <strong>Hilfe</strong> tippen.
        </p>
      </div>
    </section>

    <!-- Spielbildschirm -->
    <section id="game" class="screen">
      <div class="card">
        <div class="topbar">
          <button class="small" onclick="goMenu()">⬅ Menü</button>
          <span class="badge" id="modeBadge">⚽ Plus</span>
          <span class="badge" id="levelBadge">Level 1</span>
        </div>

        <div class="task-box">
          <div class="story" id="story">Aufgabe</div>
          <div class="math" id="mathText">1 + 1 = ?</div>

          <div class="answer-row">
            <input
              id="answer"
              type="number"
              inputmode="numeric"
              pattern="[0-9]*"
              aria-label="Antwort eingeben"
              placeholder="?"
            />
            <button class="primary" onclick="checkAnswer()">Prüfen</button>
          </div>

          <div class="number-pad" aria-label="Zahlenfeld">
            <button onclick="pressNum('1')">1</button>
            <button onclick="pressNum('2')">2</button>
            <button onclick="pressNum('3')">3</button>
            <button onclick="pressNum('4')">4</button>
            <button onclick="pressNum('5')">5</button>
            <button onclick="pressNum('6')">6</button>
            <button onclick="pressNum('7')">7</button>
            <button onclick="pressNum('8')">8</button>
            <button onclick="pressNum('9')">9</button>
            <button onclick="clearAnswer()">⌫</button>
            <button onclick="pressNum('0')">0</button>
            <button onclick="checkAnswer()">✅</button>
          </div>

          <div class="answer-row">
            <button class="yellow" onclick="toggleHelp()">💡 Hilfe</button>
            <button onclick="readTask()">🔊 Vorlesen</button>
          </div>

          <div id="feedback" class="feedback"></div>

          <div id="helpPanel" class="help-panel">
            <div class="help-title">Schau genau:</div>
            <div id="helpContent"></div>
          </div>
        </div>

        <div class="progress">
          <div class="progress-item">⭐ Richtig: <span id="correctCount">0</span></div>
          <div class="progress-item">🔥 Serie: <span id="streakCount">0</span></div>
          <div class="progress-item">🎯 Aufgabe: <span id="taskCount">0</span></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const screens = {
      menu: document.getElementById("menu"),
      game: document.getElementById("game")
    };

    const storyEl = document.getElementById("story");
    const mathTextEl = document.getElementById("mathText");
    const answerEl = document.getElementById("answer");
    const feedbackEl = document.getElementById("feedback");
    const helpPanel = document.getElementById("helpPanel");
    const helpContent = document.getElementById("helpContent");
    const modeBadge = document.getElementById("modeBadge");
    const levelBadge = document.getElementById("levelBadge");

    const correctCountEl = document.getElementById("correctCount");
    const streakCountEl = document.getElementById("streakCount");
    const taskCountEl = document.getElementById("taskCount");

    let mode = "plus";
    let level = 1;

    let currentTask = null;

    let correctTotal = 0;
    let correctStreak = 0;
    let wrongStreak = 0;
    let taskTotal = 0;

    const levelMax = {
      1: 10,
      2: 20,
      3: 50,
      4: 100
    };

    const modeNames = {
      plus: "⚽ Plus",
      minus: "🚌 Minus",
      money: "💶 Euro"
    };

    const footballThings = [
      "Fußbälle",
      "Fähnchen",
      "Trikots",
      "Schals",
      "Tore",
      "Hütchen"
    ];

    function startGame(selectedMode) {
      mode = selectedMode;
      level = 1;

      correctTotal = 0;
      correctStreak = 0;
      wrongStreak = 0;
      taskTotal = 0;

      screens.menu.classList.remove("active");
      screens.game.classList.add("active");

      modeBadge.textContent = modeNames[mode];
      updateStats();
      newTask();
    }

    function goMenu() {
      screens.game.classList.remove("active");
      screens.menu.classList.add("active");
      stopSpeech();
    }

    function updateStats() {
      correctCountEl.textContent = correctTotal;
      streakCountEl.textContent = correctStreak;
      taskCountEl.textContent = taskTotal;
      levelBadge.textContent = "Level " + level + " · bis " + levelMax[level];
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function newTask() {
      helpPanel.classList.remove("show");
      feedbackEl.textContent = "";
      feedbackEl.className = "feedback";
      answerEl.value = "";

      if (mode === "plus") {
        currentTask = makePlusTask();
      }

      if (mode === "minus") {
        currentTask = makeMinusTask();
      }

      if (mode === "money") {
        currentTask = makeMoneyTask();
      }

      storyEl.textContent = currentTask.story;
      mathTextEl.textContent = currentTask.math;
      helpContent.innerHTML = currentTask.help;

      setTimeout(() => answerEl.focus(), 100);
      updateStats();
    }

    function makePlusTask() {
      const max = levelMax[level];
      let a = randomInt(1, Math.max(2, Math.floor(max / 2)));
      let b = randomInt(1, max - a);
      const thing = pick(footballThings);

      return {
        answer: a + b,
        story: `Im Training liegen ${a} ${thing}. Dann kommen ${b} dazu.`,
        math: `${a} + ${b} = ?`,
        speak: `Im Training liegen ${a} ${thing}. Dann kommen ${b} dazu. Wie viele sind es zusammen?`,
        help: `
          <p><strong>Plus heißt: zusammenlegen.</strong></p>
          <p>Erst ${a}, dann ${b} dazu.</p>
          ${visualNumber(a, "⚽")}
          <div style="font-size:2rem;font-weight:900;">+</div>
          ${visualNumber(b, "⚽")}
          <div style="font-size:2rem;font-weight:900;">= zusammen zählen</div>
        `
      };
    }

    function makeMinusTask() {
      const max = levelMax[level];
      let a = randomInt(2, max);
      let b = randomInt(1, a - 1);

      const stories = [
        {
          story: `Im Mannschaftsbus sitzen ${a} Fans. ${b} Fans steigen aus.`,
          item: "🚌",
          speak: `Im Mannschaftsbus sitzen ${a} Fans. ${b} Fans steigen aus. Wie viele Fans bleiben im Bus?`
        },
        {
          story: `Im Stadion hängen ${a} Fähnchen. ${b} werden abgenommen.`,
          item: "🚩",
          speak: `Im Stadion hängen ${a} Fähnchen. ${b} werden abgenommen. Wie viele Fähnchen bleiben?`
        },
        {
          story: `Die Mannschaft hat ${a} Bälle. ${b} Bälle werden weggeräumt.`,
          item: "⚽",
          speak: `Die Mannschaft hat ${a} Bälle. ${b} Bälle werden weggeräumt. Wie viele Bälle bleiben?`
        }
      ];

      const s = pick(stories);

      return {
        answer: a - b,
        story: s.story,
        math: `${a} − ${b} = ?`,
        speak: s.speak,
        help: `
          <p><strong>Minus heißt: etwas wegnehmen.</strong></p>
          <p>Starte mit ${a}. Streiche ${b} weg.</p>
          ${visualMinus(a, b, s.item)}
          <div style="font-size:2rem;font-weight:900;">Übrig bleibt die Antwort.</div>
        `
      };
    }

    function makeMoneyTask() {
      const max = levelMax[level];

      if (level <= 2) {
        let a = randomInt(1, Math.max(2, Math.floor(max / 2)));
        let b = randomInt(1, max - a);

        return {
          answer: a + b,
          story: `Im Fan-Shop kostet ein Schal ${a} €. Ein Fähnchen kostet ${b} €.` ,
          math: `${a} € + ${b} € = ?`,
          speak: `Im Fan-Shop kostet ein Schal ${a} Euro. Ein Fähnchen kostet ${b} Euro. Wie viel kostet es zusammen?`,
          help: `
            <p><strong>Lege das Geld zusammen.</strong></p>
            <p>${a} € und ${b} €.</p>
            ${visualMoney(a)}
            <div style="font-size:2rem;font-weight:900;">+</div>
            ${visualMoney(b)}
          `
        };
      } else {
        let price = randomInt(5, Math.min(70, max - 1));
        let paidOptions = [10, 20, 50, 100].filter(x => x > price && x <= max);
        let paid = paidOptions.length ? pick(paidOptions) : max;

        return {
          answer: paid - price,
          story: `Du kaufst ein Trikot für ${price} €. Du bezahlst mit ${paid} €.` ,
          math: `${paid} € − ${price} € = ?`,
          speak: `Du kaufst ein Trikot für ${price} Euro. Du bezahlst mit ${paid} Euro. Wie viel Euro bekommst du zurück?`,
          help: `
            <p><strong>Wechselgeld: Bezahlt minus Preis.</strong></p>
            <p>Du hast ${paid} €. Das Trikot kostet ${price} €.</p>
            ${visualMoney(paid)}
            <div style="font-size:2rem;font-weight:900;">− ${price} €</div>
            <p>Zähle, was übrig bleibt.</p>
          `
        };
      }
    }

    function visualNumber(number, symbol) {
      const tens = Math.floor(number / 10);
      const ones = number % 10;

      let html = `<div class="visual-row">`;

      for (let i = 0; i < tens; i++) {
        html += `<div class="ten-block"><span>10</span><span>${symbol}${symbol}</span></div>`;
      }

      for (let i = 0; i < ones; i++) {
        html += `<span class="icon">${symbol}</span>`;
      }

      html += `</div>`;

      if (number >= 10) {
        html += `<p><strong>${tens}</strong> Zehner und <strong>${ones}</strong> Einer = <strong>${number}</strong></p>`;
      }

      return html;
    }

    function visualMinus(start, takeAway, symbol) {
      const showAll = start <= 30;

      if (showAll) {
        let html = `<div class="visual-row">`;

        for (let i = 1; i <= start; i++) {
          const crossed = i <= takeAway ? "cross" : "";
          html += `<span class="icon ${crossed}">${symbol}</span>`;
        }

        html += `</div>`;
        return html;
      }

      return `
        <p>Die Zahl ist groß. Nutze Zehner und Einer.</p>
        ${visualNumber(start, symbol)}
        <p><strong>Davon ${takeAway} wegnehmen.</strong></p>
      `;
    }

    function visualMoney(amount) {
      const fifties = Math.floor(amount / 50);
      amount = amount % 50;

      const twenties = Math.floor(amount / 20);
      amount = amount % 20;

      const tens = Math.floor(amount / 10);
      amount = amount % 10;

      const fives = Math.floor(amount / 5);
      amount = amount % 5;

      const ones = amount;

      let html = `<div class="visual-row">`;

      for (let i = 0; i < fifties; i++) html += `<span class="note">50 €</span>`;
      for (let i = 0; i < twenties; i++) html += `<span class="note">20 €</span>`;
      for (let i = 0; i < tens; i++) html += `<span class="note">10 €</span>`;
      for (let i = 0; i < fives; i++) html += `<span class="note">5 €</span>`;
      for (let i = 0; i < ones; i++) html += `<span class="coin">1 €</span>`;

      html += `</div>`;
      return html;
    }

    function checkAnswer() {
      const value = Number(answerEl.value);

      if (answerEl.value.trim() === "") {
        feedbackEl.textContent = "Gib zuerst eine Zahl ein.";
        feedbackEl.className = "feedback try";
        return;
      }

      taskTotal++;

      if (value === currentTask.answer) {
        correctTotal++;
        correctStreak++;
        wrongStreak = 0;

        feedbackEl.textContent = pick([
          "Tor! Richtig! ⚽",
          "Stark gespielt! ✅",
          "Super gerechnet! ⭐",
          "Volltreffer! 🥅"
        ]);
        feedbackEl.className = "feedback good";

        if (correctStreak >= 20 && level < 4) {
          level++;
          correctStreak = 0;
          feedbackEl.textContent = "Klasse! Du steigst ein Level auf! 🏆";
        }

        updateStats();

        setTimeout(newTask, 1100);
      } else {
        wrongStreak++;
        correctStreak = 0;

        feedbackEl.textContent = "Fast! Schau dir die Hilfe an und versuche es nochmal.";
        feedbackEl.className = "feedback try";
        helpPanel.classList.add("show");

        if (wrongStreak >= 5 && level > 1) {
          level--;
          wrongStreak = 0;
          feedbackEl.textContent = "Wir machen es etwas leichter. Du schaffst das! 💪";
        }

        updateStats();
      }
    }

    function toggleHelp() {
      helpPanel.classList.toggle("show");
    }

    function pressNum(num) {
      if (answerEl.value.length < 3) {
        answerEl.value += num;
      }
      answerEl.focus();
    }

    function clearAnswer() {
      answerEl.value = answerEl.value.slice(0, -1);
      answerEl.focus();
    }

    answerEl.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        checkAnswer();
      }
    });

    function readTask() {
      stopSpeech();

      if (!("speechSynthesis" in window)) {
        feedbackEl.textContent = "Vorlesen ist auf diesem Gerät nicht verfügbar.";
        feedbackEl.className = "feedback try";
        return;
      }

      const utterance = new SpeechSynthesisUtterance(currentTask.speak);
      utterance.lang = "de-DE";
      utterance.rate = 0.9;
      window.speechSynthesis.speak(utterance);
    }

    function stopSpeech() {
      if ("speechSynthesis" in window) {
        window.speechSynthesis.cancel();
      }
    }
  </script>
</body>
</html>
